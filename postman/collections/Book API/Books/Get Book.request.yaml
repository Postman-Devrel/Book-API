$kind: http-request
name: Get Book
method: GET
url: "{{baseUrl}}/api/v1/books/{{bookId}}"
description: Retrieve a single book by ID
scripts:
  - type: afterResponse
    code: |-
      pm.test("Status code is 200", function () {
          pm.response.to.have.status(200);
      });
    language: text/javascript
order: 2000
